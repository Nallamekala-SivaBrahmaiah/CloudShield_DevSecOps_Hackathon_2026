apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudshield-deployment
  labels:
    app: cloudshield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudshield
  template:
    metadata:
      labels:
        app: cloudshield
    spec:
      containers:
      - name: cloudshield-container
        image: cloudshield:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: cloudshield-service
spec:
  selector:
    app: cloudshield
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
